<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="QMail - Quantum-Encrypted Email Client with end-to-end QKD security">
    <title>QMail - Quantum Encrypted Email</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <!-- Login Screen -->
    <div id="loginScreen" class="screen active">
        <div class="login-container">
            <div class="login-card">
                <div class="logo-section">
                    <div class="logo-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                            <path
                                d="M3 8L10.89 13.26C11.5 13.67 12.5 13.67 13.11 13.26L21 8M5 19H19C20.1046 19 21 18.1046 21 17V7C21 5.89543 20.1046 5 19 5H5C3.89543 5 3 5.89543 3 7V17C3 18.1046 3.89543 19 5 19Z" />
                        </svg>
                    </div>
                    <h1>QMail</h1>
                    <p class="login-subtitle">Quantum-Encrypted Email</p>
                </div>

                <div class="login-content">
                    <h2>Welcome</h2>
                    <p class="login-desc">Sign in with your Google account to send and receive quantum-encrypted emails.</p>

                    <button class="google-signin-btn" id="googleSignInBtn">
                        <svg class="google-icon" viewBox="0 0 24 24" width="18" height="18">
                            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
                            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                        </svg>
                        Sign in with Google
                    </button>

                    <div id="loginStatus" class="login-status" style="display:none;"></div>

                    <div class="login-footer">
                        <span class="security-badge">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                            </svg>
                            Secured with end-to-end quantum encryption
                        </span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Main Email Client -->
    <div id="emailClient" class="screen">
        <div class="app-container">
            <aside class="sidebar">
                <div class="sidebar-header">
                    <h2>QMail</h2>
                </div>

                <button class="compose-btn" id="composeBtn">Compose</button>

                <nav class="sidebar-nav">
                    <a href="#" class="nav-item active"><span>Inbox</span></a>
                    <a href="#" class="nav-item"><span>Sent</span></a>
                    <a href="#" class="nav-item"><span>Drafts</span></a>
                    <a href="#" class="nav-item"><span>Starred</span></a>
                    <a href="#" class="nav-item"><span>Important</span></a>
                    <a href="#" class="nav-item"><span>Spam</span></a>
                    <a href="#" class="nav-item"><span>Trash</span></a>
                </nav>

                <div class="user-profile" id="userProfileTrigger">
                    <div class="user-avatar">U</div>
                    <div class="user-info">
                        <div class="user-name" id="userName">User</div>
                    </div>
                    <!-- Profile Popover -->
                    <div class="profile-popover" id="profilePopover">
                        <div class="popover-header">
                            <div class="popover-avatar">U</div>
                            <div class="popover-details">
                                <span class="popover-name">User Name</span>
                                <span class="popover-email">user@gmail.com</span>
                            </div>
                        </div>
                        <div class="popover-menu">
                            <button class="menu-item">Manage Account</button>
                            <button class="menu-item logout" id="logoutBtn">Sign out</button>
                        </div>
                    </div>
                </div>
            </aside>

            <main class="email-list-container">
                <div class="email-list-header">
                    <span>Inbox</span>
                    <div class="header-controls">
                        <label class="filter-switch" title="Toggle: Quantum only / All emails">
                            <input type="checkbox" id="filterToggle">
                            <span class="filter-slider"></span>
                            <span class="filter-label">All</span>
                        </label>
                        <button class="refresh-btn" id="refreshBtn" title="Refresh inbox">🔄</button>
                    </div>
                    <div class="search-bar">
                        <input type="text" id="searchInput" placeholder="Search mail">
                    </div>
                </div>
                <div class="email-list" id="emailList"></div>
            </main>

            <section class="email-detail" id="emailDetail">
                <div style="text-align:center; padding-top: 100px; color: var(--text-secondary);">Select an email to
                    read</div>
            </section>
        </div>
    </div>

    <!-- Compose Modal -->
    <div id="composeModal" class="modal">
        <div class="modal-content compose-modal">
            <div class="modal-header">
                <h2>New Message</h2>
                <button class="close-btn" id="closeComposeBtn">X</button>
            </div>

            <div class="compose-form">
                <div class="form-group">
                    <label>To</label>
                    <input type="email" id="recipientEmail" required>
                </div>

                <div class="form-group">
                    <label>Subject</label>
                    <input type="text" id="emailSubject" required>
                </div>

                <div class="form-group">
                    <label>Security Level</label>
                    <div class="custom-select">
                        <select id="securityLevel">
                            <option value="1">Basic (OTP)</option>
                            <option value="2" selected>Standard (AES-256-GCM)</option>
                            <option value="3">High (ChaCha20-Poly1305)</option>
                            <option value="4">Maximum (Hybrid)</option>
                        </select>
                    </div>
                </div>

                <div class="form-group editor-group">
                    <label>Message</label>
                    <div class="editor-toolbar">
                        <button type="button" class="toolbar-btn" data-command="bold">B</button>
                        <button type="button" class="toolbar-btn" data-command="italic">I</button>
                        <button type="button" class="toolbar-btn" data-command="underline">U</button>
                    </div>
                    <div class="editor" id="emailBody" contenteditable="true"></div>
                </div>

                <div class="compose-actions">
                    <button class="btn-secondary" id="saveDraftBtn">Save Draft</button>
                    <button class="btn-primary" id="sendEmailBtn">Send</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
